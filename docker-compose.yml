version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  partner-external-api:
    build:
      context: .
      dockerfile: PartnerExternalApi/Dockerfile
    ports:
      - "5241:8080"

  partner-integration-bff:
    build:
      context: .
      dockerfile: PartnerIntegrationBFF/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Security__PartnerSecrets__partner-01=docker-secret-partner-01
      - ExternalApi__BaseUrl=http://partner-external-api:5241
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - rabbitmq
      - partner-external-api
